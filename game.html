<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保卫小仙女</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e6edf3;
      overflow-x: hidden;
    }
    h1 {
      font-size: 28px;
      margin: 20px 0 10px;
      background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255,215,0,0.3);
    }
    .subtitle {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 15px;
    }
    
    /* 顶部状态栏 */
    .top-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }
    .stat-icon { font-size: 20px; }
    .stat-value { font-weight: 700; color: #ffd700; }
    .stat-label { font-size: 12px; color: #8b949e; }
    .lives { color: #f85149; }
    .wave { color: #58a6ff; }
    .money { color: #ffd700; }
    
    /* 游戏区域 */
    .game-container {
      position: relative;
      background: #0d1117;
      border: 2px solid #30363d;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    
    canvas {
      display: block;
      border-radius: 8px;
      cursor: pointer;
    }
    
    /* 底部控制栏 */
    .bottom-bar {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .tower-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 15px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      min-width: 90px;
    }
    .tower-btn:hover {
      border-color: #58a6ff;
      background: rgba(88,166,255,0.15);
      transform: translateY(-2px);
    }
    .tower-btn.selected {
      border-color: #ffd700;
      background: rgba(255,215,0,0.15);
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
    }
    .tower-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .tower-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .tower-cost { font-size: 12px; color: #ffd700; }
    .tower-stats { font-size: 10px; color: #8b949e; }
    
    /* 操作按钮 */
    .action-btn {
      background: linear-gradient(135deg, #f5222d, #fa541c);
      border: none;
      border-radius: 10px;
      padding: 12px 25px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(245,34,45,0.5); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .action-btn.green { background: linear-gradient(135deg, #52c41a, #73d13d); }
    .action-btn.green:hover { box-shadow: 0 0 20px rgba(82,196,26,0.5); }
    
    /* 游戏结束遮罩 */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .overlay.hidden { display: none; }
    .overlay-content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 40px 50px;
      text-align: center;
    }
    .overlay-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 15px;
    }
    .overlay-title.win { color: #ffd700; }
    .overlay-title.lose { color: #f85149; }
    .overlay-msg { font-size: 16px; color: #8b949e; margin-bottom: 25px; }
    .overlay-score { font-size: 20px; color: #58a6ff; margin-bottom: 20px; }
    
    /* 提示信息 */
    .tip {
      position: absolute;
      background: rgba(0,0,0,0.9);
      color: #ffd700;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .tip.hidden { display: none; }
  </style>
</head>
<body>
  <h1>✨ 保卫小仙女 ✨</h1>
  <p class="subtitle">建造魔法塔，守护小仙女的家园</p>
  
  <div class="top-bar">
    <div class="stat-box">
      <span class="stat-icon">💫</span>
      <div>
        <div class="stat-value" id="money">200</div>
        <div class="stat-label">星尘</div>
      </div>
    </div>
    <div class="stat-box">
      <span class="stat-icon">💖</span>
      <div>
        <div class="stat-value lives" id="lives">100</div>
        <div class="stat-label">血量</div>
      </div>
    </div>
    <div class="stat-box">
      <span class="stat-icon">🌊</span>
      <div>
        <div class="stat-value wave" id="wave">0 / 10</div>
        <div class="stat-label">波次</div>
      </div>
    </div>
  </div>
  
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="tip hidden" id="tip"></div>
  </div>
  
  <div class="bottom-bar">
    <button class="tower-btn" data-tower="flower" data-cost="50">
      <div class="tower-name">🌸 花精灵</div>
      <div class="tower-cost">💫 50</div>
      <div class="tower-stats">伤害10 | 范围3</div>
    </button>
    <button class="tower-btn" data-tower="orb" data-cost="80">
      <div class="tower-name">🔵 光球塔</div>
      <div class="tower-cost">💫 80</div>
      <div class="tower-stats">伤害5 | 范围4 | 快</div>
    </button>
    <button class="tower-btn" data-tower="star" data-cost="120">
      <div class="tower-name">⭐ 星光箭</div>
      <div class="tower-cost">💫 120</div>
      <div class="tower-stats">伤害25 | 范围2</div>
    </button>
    <button class="action-btn green" id="startBtn">开始波次</button>
    <button class="action-btn" id="restartBtn">重新开始</button>
  </div>
  
  <!-- 游戏结束遮罩 -->
  <div class="overlay hidden" id="overlay">
    <div class="overlay-content">
      <div class="overlay-title" id="overlayTitle">🎉 胜利!</div>
      <div class="overlay-msg" id="overlayMsg">你成功守护了小仙女!</div>
      <div class="overlay-score" id="overlayScore"></div>
      <button class="action-btn green" onclick="restartGame()">再来一局</button>
    </div>
  </div>

<script>
// ==================== 游戏配置 ====================
const GRID_COLS = 15;
const GRID_ROWS = 9;
const CELL_SIZE = 50;
const CANVAS_W = GRID_COLS * CELL_SIZE;
const CANVAS_H = GRID_ROWS * CELL_SIZE;

const TOWER_TYPES = {
  flower: { name: '花精灵', damage: 10, range: 3, fireRate: 1000, cost: 50, color: '#ff69b4', emoji: '🌸' },
  orb: { name: '光球塔', damage: 5, range: 4, fireRate: 500, cost: 80, color: '#58a6ff', emoji: '🔵' },
  star: { name: '星光箭', damage: 25, range: 2, fireRate: 2000, cost: 120, color: '#ffd700', emoji: '⭐' },
};

const ENEMY_TYPES = {
  slime: { name: '史莱姆', hp: 30, speed: 2, reward: 10, color: '#73d13d', radius: 12 },
  bigmouth: { name: '大嘴怪', hp: 80, speed: 1.2, reward: 25, color: '#fa8c16', radius: 15 },
  dragon: { name: '恶龙', hp: 200, speed: 0.8, reward: 60, color: '#f5222d', radius: 18 },
};

const WAVES = [
  [{ type: 'slime', count: 5, delay: 800 }],
  [{ type: 'slime', count: 8, delay: 700 }],
  [{ type: 'slime', count: 5, delay: 600 }, { type: 'bigmouth', count: 2, delay: 1500 }],
  [{ type: 'bigmouth', count: 5, delay: 1000 }],
  [{ type: 'slime', count: 10, delay: 500 }, { type: 'bigmouth', count: 3, delay: 1200 }],
  [{ type: 'bigmouth', count: 8, delay: 800 }],
  [{ type: 'slime', count: 15, delay: 400 }],
  [{ type: 'bigmouth', count: 5, delay: 1000 }, { type: 'dragon', count: 1, delay: 2000 }],
  [{ type: 'dragon', count: 3, delay: 1500 }],
  [{ type: 'slime', count: 20, delay: 300 }, { type: 'bigmouth', count: 10, delay: 700 }, { type: 'dragon', count: 3, delay: 1200 }],
];

// 路径点（像素坐标）
const PATH = [
  { x: 0, y: 4 }, { x: 3, y: 4 }, { x: 3, y: 2 }, { x: 7, y: 2 },
  { x: 7, y: 6 }, { x: 10, y: 6 }, { x: 10, y: 3 }, { x: 13, y: 3 },
  { x: 13, y: 7 }, { x: 14, y: 7 },
];

// 路径经过的格子
let pathCells = [];
for (let i = 0; i < PATH.length - 1; i++) {
  const start = PATH[i], end = PATH[i + 1];
  const dx = Math.sign(end.x - start.x);
  const dy = Math.sign(end.y - start.y);
  let x = start.x, y = start.y;
  while (x !== end.x || y !== end.y) {
    pathCells.push({ x, y });
    if (x !== end.x) x += dx;
    else if (y !== end.y) y += dy;
  }
}
pathCells.push({ x: PATH[PATH.length - 1].x, y: PATH[PATH.length - 1].y });

// ==================== 游戏状态 ====================
let canvas, ctx;
let gameState = 'idle'; // idle, playing, gameover, win
let money = 200;
let lives = 100;
let currentWave = 0;
let towers = [];
let enemies = [];
let projectiles = [];
let particles = [];
let selectedTower = null;
let hoveredCell = null;
let fairyPos = { x: 14, y: 7 };
let fairyHP = 100;
let fairyAngle = 0;
let lastTime = 0;
let spawnQueue = [];
let spawnTimer = 0;

// ==================== 初始化 ====================
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  
  updateUI();
  setupEventListeners();
  requestAnimationFrame(gameLoop);
}

function setupEventListeners() {
  // 塔选择
  document.querySelectorAll('.tower-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      const type = btn.dataset.tower;
      if (selectedTower === type) {
        selectedTower = null;
        btn.classList.remove('selected');
      } else {
        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
        selectedTower = type;
        btn.classList.add('selected');
      }
    });
  });
  
  // 画布点击
  canvas.addEventListener('click', handleCanvasClick);
  canvas.addEventListener('mousemove', handleCanvasMouseMove);
  canvas.addEventListener('mouseleave', () => { hoveredCell = null; });
  
  // 开始波次
  document.getElementById('startBtn').addEventListener('click', startWave);
  document.getElementById('restartBtn').addEventListener('click', restartGame);
}

function handleCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
  const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
  
  if (!selectedTower) return;
  if (isPathCell(x, y)) return;
  if (getTowerAt(x, y)) return;
  
  const cost = TOWER_TYPES[selectedTower].cost;
  if (money < cost) return;
  
  money -= cost;
  towers.push({
    type: selectedTower,
    gridX: x, gridY: y,
    lastFire: 0,
    angle: 0,
    target: null,
  });
  
  selectedTower = null;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  updateUI();
  spawnParticles(x * CELL_SIZE + CELL_SIZE / 2, y * CELL_SIZE + CELL_SIZE / 2, '#ffd700', 10);
}

function handleCanvasMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
  const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
  hoveredCell = { x, y };
  
  const tip = document.getElementById('tip');
  if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) {
    tip.classList.add('hidden');
    return;
  }
  
  const existing = getTowerAt(x, y);
  if (existing) {
    const t = TOWER_TYPES[existing.type];
    tip.textContent = `${t.emoji} ${t.name} | 伤害:${t.damage} 范围:${t.range}格`;
    tip.classList.remove('hidden');
    tip.style.left = (e.clientX - canvas.getBoundingClientRect().left + 10) + 'px';
    tip.style.top = (e.clientY - canvas.getBoundingClientRect().top - 30) + 'px';
  } else if (selectedTower) {
    const t = TOWER_TYPES[selectedTower];
    tip.textContent = `💫 ${t.cost} | 伤害:${t.damage} 范围:${t.range}格`;
    tip.classList.remove('hidden');
    tip.style.left = (e.clientX - canvas.getBoundingClientRect().left + 10) + 'px';
    tip.style.top = (e.clientY - canvas.getBoundingClientRect().top - 30) + 'px';
  } else {
    tip.classList.add('hidden');
  }
}

// ==================== 游戏逻辑 ====================
function startWave() {
  if (gameState === 'playing') return;
  if (currentWave >= WAVES.length) return;
  
  gameState = 'playing';
  document.getElementById('startBtn').disabled = true;
  
  // 构建生成队列
  spawnQueue = [];
  const wave = WAVES[currentWave];
  wave.forEach(group => {
    for (let i = 0; i < group.count; i++) {
      spawnQueue.push({ type: group.type, delay: group.delay });
    }
  });
  spawnTimer = 0;
}

function spawnEnemy(type) {
  const et = ENEMY_TYPES[type];
  const startPos = getCellCenter(PATH[0].x, PATH[0].y);
  enemies.push({
    type,
    x: startPos.x,
    y: startPos.y,
    hp: et.hp,
    maxHp: et.hp,
    speed: et.speed,
    reward: et.reward,
    color: et.color,
    radius: et.radius,
    pathIndex: 0,
    pathProgress: 0,
  });
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    
    // 移动
    if (e.pathIndex < PATH.length - 1) {
      const target = getCellCenter(PATH[e.pathIndex + 1].x, PATH[e.pathIndex + 1].y);
      const dx = target.x - e.x;
      const dy = target.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < e.speed * 60 * dt) {
        e.pathIndex++;
      } else {
        e.x += (dx / dist) * e.speed * 60 * dt;
        e.y += (dy / dist) * e.speed * 60 * dt;
      }
      e.angle = Math.atan2(dy, dx);
    } else {
      // 到达终点，扣血
      lives -= 10;
      spawnParticles(e.x, e.y, '#f85149', 15);
      enemies.splice(i, 1);
      updateUI();
      
      if (lives <= 0) {
        endGame(false);
      }
      continue;
    }
    
    // 检查是否死亡
    if (e.hp <= 0) {
      money += e.reward;
      spawnParticles(e.x, e.y, e.color, 12);
      enemies.splice(i, 1);
      updateUI();
    }
  }
}

function updateTowers(now) {
  towers.forEach(tower => {
    const tt = TOWER_TYPES[tower.type];
    const cx = tower.gridX * CELL_SIZE + CELL_SIZE / 2;
    const cy = tower.gridY * CELL_SIZE + CELL_SIZE / 2;
    
    // 找目标
    let target = null;
    let minDist = Infinity;
    enemies.forEach(e => {
      const dx = e.x - cx;
      const dy = e.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) / CELL_SIZE;
      if (dist <= tt.range && dist < minDist) {
        minDist = dist;
        target = e;
      }
    });
    
    if (target) {
      tower.angle = Math.atan2(target.y - cy, target.x - cx);
      
      if (now - tower.lastFire >= tt.fireRate) {
        tower.lastFire = now;
        // 发射子弹
        projectiles.push({
          x: cx, y: cy,
          targetX: target.x, targetY: target.y,
          damage: tt.damage,
          speed: 8,
          color: tt.color,
          target,
        });
      }
    }
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    const dx = p.targetX - p.x;
    const dy = p.targetY - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < p.speed) {
      // 命中
      if (p.target && p.target.hp > 0) {
        p.target.hp -= p.damage;
        spawnParticles(p.x, p.y, p.color, 5);
      }
      projectiles.splice(i, 1);
    } else {
      p.x += (dx / dist) * p.speed;
      p.y += (dy / dist) * p.speed;
      
      // 更新目标位置（追踪）
      if (p.target && p.target.hp > 0) {
        p.targetX = p.target.x;
        p.targetY = p.target.y;
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 50 * dt; // 重力
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 100;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      color,
      life: 0.5 + Math.random() * 0.5,
      size: 3 + Math.random() * 4,
    });
  }
}

function checkWaveComplete() {
  if (gameState !== 'playing') return;
  if (spawnQueue.length > 0 || enemies.length > 0) return;
  
  currentWave++;
  money += currentWave * 30; // 波次奖励
  updateUI();
  
  if (currentWave >= WAVES.length) {
    endGame(true);
  } else {
    document.getElementById('startBtn').disabled = false;
  }
}

function endGame(win) {
  gameState = win ? 'win' : 'gameover';
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlayTitle');
  const msg = document.getElementById('overlayMsg');
  const score = document.getElementById('overlayScore');
  
  overlay.classList.remove('hidden');
  
  if (win) {
    title.textContent = '🎉 胜利!';
    title.className = 'overlay-title win';
    msg.textContent = '你成功守护了小仙女!';
    score.textContent = `💫 获得星尘: ${money} | 通关波次: ${currentWave}`;
  } else {
    title.textContent = '💔 失败...';
    title.className = 'overlay-title lose';
    msg.textContent = '小仙女被怪兽抓住了...';
    score.textContent = `🌊 到达波次: ${currentWave + 1} / 10`;
  }
}

function restartGame() {
  money = 200;
  lives = 100;
  currentWave = 0;
  towers = [];
  enemies = [];
  projectiles = [];
  particles = [];
  selectedTower = null;
  gameState = 'idle';
  
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('startBtn').disabled = false;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  
  updateUI();
}

// ==================== 渲染 ====================
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  
  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  bgGrad.addColorStop(0, '#1a2a1a');
  bgGrad.addColorStop(1, '#0d1a0d');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  
  drawGrid();
  drawPath();
  drawTowers();
  drawEnemies();
  drawProjectiles();
  drawParticles();
  drawFairy();
  drawHoverEffect();
}

function drawGrid() {
  for (let y = 0; y < GRID_ROWS; y++) {
    for (let x = 0; x < GRID_COLS; x++) {
      const px = x * CELL_SIZE;
      const py = y * CELL_SIZE;
      
      if (isPathCell(x, y)) continue;
      
      // 草地
      ctx.fillStyle = ((x + y) % 2 === 0) ? '#2d5a2d' : '#234a23';
      ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
      
      // 边框
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);
    }
  }
}

function drawPath() {
  // 路径背景
  ctx.fillStyle = '#8b7355';
  pathCells.forEach(cell => {
    ctx.fillRect(cell.x * CELL_SIZE, cell.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
  });
  
  // 路径线
  ctx.strokeStyle = '#6b5344';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  pathCells.forEach((cell, i) => {
    const cx = cell.x * CELL_SIZE + CELL_SIZE / 2;
    const cy = cell.y * CELL_SIZE + CELL_SIZE / 2;
    if (i === 0) ctx.moveTo(cx, cy);
    else ctx.lineTo(cx, cy);
  });
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawTowers() {
  towers.forEach(tower => {
    const tt = TOWER_TYPES[tower.type];
    const cx = tower.gridX * CELL_SIZE + CELL_SIZE / 2;
    const cy = tower.gridY * CELL_SIZE + CELL_SIZE / 2;
    
    // 底座
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fill();
    
    // 塔身
    ctx.fillStyle = tt.color;
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI * 2);
    ctx.fill();
    
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 4, 5, 0, Math.PI * 2);
    ctx.fill();
    
    // 方向指示
    ctx.strokeStyle = tt.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(tower.angle) * 16, cy + Math.sin(tower.angle) * 16);
    ctx.stroke();
    
    // 塔名称
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(tt.emoji, cx, cy + 4);
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    // 身体
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
    
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(e.x - e.radius * 0.3, e.y - e.radius * 0.3, e.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    
    // 眼睛
    ctx.fillStyle = '#fff';
    const eyeOffset = e.radius * 0.4;
    ctx.beginPath();
    ctx.arc(e.x - eyeOffset, e.y - 2, 3, 0, Math.PI * 2);
    ctx.arc(e.x + eyeOffset, e.y - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e.x - eyeOffset + 1, e.y - 2, 1.5, 0, Math.PI * 2);
    ctx.arc(e.x + eyeOffset + 1, e.y - 2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    // 血条
    const hpRatio = e.hp / e.maxHp;
    const barW = e.radius * 2;
    const barH = 4;
    const barX = e.x - barW / 2;
    const barY = e.y - e.radius - 8;
    
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = hpRatio > 0.5 ? '#3fb950' : hpRatio > 0.25 ? '#e3b341' : '#f85149';
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
  });
}

function drawProjectiles() {
  projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // 拖尾
    ctx.fillStyle = p.color + '60';
    ctx.beginPath();
    ctx.arc(p.x - 3, p.y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFairy() {
  const cx = fairyPos.x * CELL_SIZE + CELL_SIZE / 2;
  const cy = fairyPos.y * CELL_SIZE + CELL_SIZE / 2;
  
  fairyAngle += 0.02;
  
  // 光环
  const glowSize = 30 + Math.sin(fairyAngle * 2) * 5;
  const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
  glowGrad.addColorStop(0, 'rgba(255, 215, 0, 0.8)');
  glowGrad.addColorStop(0.5, 'rgba(255, 215, 0, 0.3)');
  glowGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
  ctx.fill();
  
  // 小仙女身体
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy - 5, 12, 0, Math.PI * 2);
  ctx.fill();
  
  // 翅膀
  const wingAngle = fairyAngle;
  ctx.fillStyle = 'rgba(200, 220, 255, 0.7)';
  ctx.beginPath();
  ctx.ellipse(cx - 15 + Math.sin(wingAngle) * 3, cy - 5, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 15 + Math.sin(wingAngle) * 3, cy - 5, 10, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  // 王冠
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy - 15);
  ctx.lineTo(cx - 5, cy - 20);
  ctx.lineTo(cx, cy - 17);
  ctx.lineTo(cx + 5, cy - 20);
  ctx.lineTo(cx + 8, cy - 15);
  ctx.closePath();
  ctx.fill();
  
  // 血条
  const hpRatio = lives / 100;
  const barW = 40;
  const barH = 5;
  ctx.fillStyle = '#333';
  ctx.fillRect(cx - barW / 2, cy + 15, barW, barH);
  ctx.fillStyle = hpRatio > 0.5 ? '#f85149' : '#f5222d';
  ctx.fillRect(cx - barW / 2, cy + 15, barW * hpRatio, barH);
}

function drawHoverEffect() {
  if (!hoveredCell) return;
  if (!selectedTower) return;
  
  const { x, y } = hoveredCell;
  if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) return;
  
  const px = x * CELL_SIZE;
  const py = y * CELL_SIZE;
  const cx = px + CELL_SIZE / 2;
  const cy = py + CELL_SIZE / 2;
  
  if (isPathCell(x, y) || getTowerAt(x, y)) {
    // 不能建造
    ctx.fillStyle = 'rgba(248, 81, 73, 0.3)';
    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
    ctx.strokeStyle = '#f85149';
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 2, py + 2, CELL_SIZE - 4, CELL_SIZE - 4);
  } else {
    // 可以建造
    const tt = TOWER_TYPES[selectedTower];
    
    // 范围预览
    ctx.strokeStyle = tt.color + '60';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(cx, cy, tt.range * CELL_SIZE, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // 位置预览
    ctx.fillStyle = tt.color + '80';
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = tt.color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ==================== 游戏循环 ====================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  
  // 更新生成
  if (spawnQueue.length > 0) {
    spawnTimer += dt * 1000;
    const next = spawnQueue[0];
    if (spawnTimer >= next.delay) {
      spawnEnemy(next.type);
      spawnQueue.shift();
      spawnTimer = 0;
    }
  }
  
  // 更新游戏
  if (gameState === 'playing') {
    updateEnemies(dt);
    updateTowers(timestamp);
    updateProjectiles(dt);
    checkWaveComplete();
  }
  
  updateParticles(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

// ==================== 工具函数 ====================
function isPathCell(x, y) {
  return pathCells.some(p => p.x === x && p.y === y);
}

function getTowerAt(x, y) {
  return towers.find(t => t.gridX === x && t.gridY === y);
}

function getCellCenter(col, row) {
  return {
    x: col * CELL_SIZE + CELL_SIZE / 2,
    y: row * CELL_SIZE + CELL_SIZE / 2,
  };
}

function updateUI() {
  document.getElementById('money').textContent = money;
  document.getElementById('lives').textContent = lives;
  document.getElementById('wave').textContent = `${currentWave} / 10`;
  
  // 更新按钮状态
  document.querySelectorAll('.tower-btn').forEach(btn => {
    const cost = parseInt(btn.dataset.cost);
    if (money < cost) {
      btn.classList.add('disabled');
    } else {
      btn.classList.remove('disabled');
    }
  });
}

// 启动游戏
init();
</script>
