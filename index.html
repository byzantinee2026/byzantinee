<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A股指数实时行情</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 700px; padding: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 32px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .title-group { display: flex; align-items: center; gap: 12px; }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #f5222d, #fa541c); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 12px; color: #8b949e; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
    .dot.disconnected { background: #f85149; animation: none; }
    .dot.loading { background: #e3b341; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .index-selector { display: flex; gap: 10px; margin-bottom: 16px; }
    .index-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4; }
    .index-btn:hover { border-color: #58a6ff; color: #e6edf3; }
    .index-btn.active { background: rgba(248, 81, 73, 0.15); border-color: #f85149; color: #f85149; }
    .index-btn small { display: block; font-size: 11px; opacity: 0.6; }
    .source-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .source-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .source-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .source-btn.active { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.1); }
    .price-section { text-align: center; margin-bottom: 28px; }
    .price { font-size: 56px; font-weight: 700; letter-spacing: -2px; line-height: 1; margin-bottom: 8px; }
    .price.up, .change.up, .percent.up { color: #f85149; }
    .price.down, .change.down, .percent.down { color: #3fb950; }
    .price.flat, .change.flat, .percent.flat { color: #8b949e; }
    .change { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .percent { font-size: 16px; font-weight: 500; }
    .chart-container { background: #0d1117; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
    .chart-title { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
    canvas { width: 100% !important; height: 160px !important; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat { background: #0d1117; border-radius: 10px; padding: 14px 10px; text-align: center; }
    .stat-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
    .stat-value { font-size: 15px; font-weight: 600; }
    .time { text-align: center; margin-top: 16px; font-size: 12px; color: #484f58; }
    .time span { color: #6e7681; }
    .loading { text-align: center; padding: 60px 0; color: #8b949e; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #f5222d; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px 0; color: #8b949e; }
    .error-msg .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="title-group">
          <div class="logo">📈</div>
          <div>
            <div class="title" id="indexName">上证指数</div>
            <div class="subtitle" id="indexCode">SSE · 000001</div>
          </div>
        </div>
        <div class="status">
          <div class="dot loading" id="dot"></div>
          <span id="connStatus">连接中</span>
        </div>
      </div>

      <div class="index-selector">
        <button class="index-btn active" data-index="sh" data-name="上证指数" data-code="000001" data-label="SSE">
          上证指数<small>000001</small>
        </button>
        <button class="index-btn" data-index="sz" data-name="深成指" data-code="399001" data-label="SZSE">
          深成指<small>399001</small>
        </button>
      </div>

      <div class="source-selector">
        <button class="source-btn active" data-source="eastmoney">东方财富</button>
        <button class="source-btn" data-source="netEase">网易财经</button>
        <button class="source-btn" data-source="tencent">腾讯证券</button>
      </div>

      <div id="loading" class="loading"><div class="loading-spinner"></div>正在获取数据...</div>
      <div id="error" class="error-msg" style="display:none">
        <div class="icon">⚠️</div>
        <div id="errorText">数据加载失败</div>
        <div style="font-size:12px;margin-top:8px">点击按钮切换数据源重试</div>
      </div>
      <div id="content" style="display:none">
        <div class="price-section">
          <div class="price" id="price">--</div>
          <div class="change" id="change">--</div>
          <div class="percent" id="percent">--</div>
        </div>
        <div class="chart-container">
          <div class="chart-title">分时走势</div>
          <canvas id="chart"></canvas>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-label">开盘</div><div class="stat-value" id="open">--</div></div>
          <div class="stat"><div class="stat-label">最高</div><div class="stat-value" id="high">--</div></div>
          <div class="stat"><div class="stat-label">最低</div><div class="stat-value" id="low">--</div></div>
          <div class="stat"><div class="stat-label">成交量</div><div class="stat-value" id="volume">--</div></div>
        </div>
        <div class="time">数据来源: <span id="dataSource">--</span> &nbsp;|&nbsp; 更新时间: <span id="updateTime">--</span></div>
      </div>
    </div>
  </div>

<script>
// 指数配置
const INDICES = {
  sh: { name: '上证指数', code: '000001', label: 'SSE', secid: '1.000001', tencent: 's_sh000001', netease: '0000001' },
  sz: { name: '深成指', code: '399001', label: 'SZSE', secid: '0.399001', tencent: 's_sz399001', netease: '1399001' },
};

let currentIndex = 'sh';
let currentSource = 'eastmoney';
let priceHistory = [];
const MAX_HISTORY = 150;
let isFirstLoad = true;

const el = {
  loading: document.getElementById('loading'),
  error: document.getElementById('error'),
  errorText: document.getElementById('errorText'),
  content: document.getElementById('content'),
  connStatus: document.getElementById('connStatus'),
  dot: document.getElementById('dot'),
  indexName: document.getElementById('indexName'),
  indexCode: document.getElementById('indexCode'),
  price: document.getElementById('price'),
  change: document.getElementById('change'),
  percent: document.getElementById('percent'),
  open: document.getElementById('open'),
  high: document.getElementById('high'),
  low: document.getElementById('low'),
  volume: document.getElementById('volume'),
  updateTime: document.getElementById('updateTime'),
  dataSource: document.getElementById('dataSource'),
  canvas: document.getElementById('chart'),
};

const SOURCE_LABELS = { eastmoney: '东方财富', netEase: '网易财经', tencent: '腾讯证券' };

function fmt(n, d = 2) { return typeof n === 'number' && !isNaN(n) ? n.toFixed(d) : '--'; }
function fmtVol(v) {
  if (!v || typeof v !== 'number') return '--';
  if (v >= 100000000) return (v / 100000000).toFixed(2) + ' 亿';
  if (v >= 10000) return (v / 10000).toFixed(0) + ' 万';
  return v.toString();
}

function showLoading() {
  el.loading.style.display = 'block'; el.error.style.display = 'none'; el.content.style.display = 'none';
  el.dot.className = 'dot loading'; el.connStatus.textContent = '连接中';
}
function showError(msg) {
  el.loading.style.display = 'none'; el.error.style.display = 'block';
  el.errorText.textContent = msg; el.content.style.display = 'none';
  el.dot.className = 'dot disconnected'; el.connStatus.textContent = '离线';
}
function showContent() {
  el.loading.style.display = 'none'; el.error.style.display = 'none'; el.content.style.display = 'block';
  el.dot.className = 'dot'; el.connStatus.textContent = '实时';
}

function updateUI(data) {
  const dir = data.change > 0 ? 'up' : data.change < 0 ? 'down' : 'flat';
  el.price.textContent = fmt(data.price);
  el.change.textContent = (data.change >= 0 ? '+' : '') + fmt(data.change);
  el.percent.textContent = (data.change >= 0 ? '+' : '') + fmt(data.percent) + '%';
  ['price', 'change', 'percent'].forEach(id => {
    const e = el[id]; e.className = e.className.replace(/\b(up|down|flat)\b/g, '').trim() + ' ' + dir;
  });
  el.open.textContent = fmt(data.open);
  el.high.textContent = fmt(data.high);
  el.low.textContent = fmt(data.low);
  el.volume.textContent = fmtVol(data.volume);
  el.dataSource.textContent = SOURCE_LABELS[currentSource] || currentSource;
  el.updateTime.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  drawChart();
}

function drawChart() {
  const canvas = el.canvas;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  const pad = { top: 10, right: 10, bottom: 20, left: 10 };
  const chartW = w - pad.left - pad.right, chartH = h - pad.top - pad.bottom;
  ctx.clearRect(0, 0, w, h);
  if (priceHistory.length < 2) return;
  const prices = priceHistory.map(p => p.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const prevClose = priceHistory[0].prevClose || min;

  // 网格
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = pad.top + (chartH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }
  // 昨收参考线
  ctx.strokeStyle = '#484f58'; ctx.setLineDash([4, 4]);
  const refY = pad.top + chartH * (1 - (prevClose - min) / range);
  ctx.beginPath(); ctx.moveTo(pad.left, refY); ctx.lineTo(w - pad.right, refY); ctx.stroke();
  ctx.setLineDash([]);

  const lastPrice = prices[prices.length - 1];
  const lineColor = lastPrice >= prevClose ? '#f85149' : '#3fb950';
  const fillColor = lastPrice >= prevClose ? 'rgba(248,81,73,0.15)' : 'rgba(63,185,80,0.15)';

  // 填充
  ctx.beginPath();
  priceHistory.forEach((p, i) => {
    const x = pad.left + (i / (priceHistory.length - 1)) * chartW;
    const y = pad.top + chartH * (1 - (p.price - min) / range);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + chartW, refY); ctx.lineTo(pad.left, refY); ctx.closePath();
  ctx.fillStyle = fillColor; ctx.fill();

  // 线
  ctx.beginPath();
  priceHistory.forEach((p, i) => {
    const x = pad.left + (i / (priceHistory.length - 1)) * chartW;
    const y = pad.top + chartH * (1 - (p.price - min) / range);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();

  // 当前点
  const dotX = pad.left + chartW;
  const dotY = pad.top + chartH * (1 - (lastPrice - min) / range);
  ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
  ctx.fillStyle = lineColor; ctx.fill();
  ctx.strokeStyle = '#161b22'; ctx.lineWidth = 2; ctx.stroke();

  // 标签
  ctx.font = '10px -apple-system, sans-serif'; ctx.fillStyle = '#8b949e'; ctx.textAlign = 'right';
  ctx.fillText(fmt(max, 2), w - pad.right, pad.top + 10);
  ctx.fillText(fmt(min, 2), w - pad.right, h - pad.bottom);
}

// 东方财富
async function fetchEastmoney(idx) {
  const res = await fetch(
    `https://push2.eastmoney.com/api/qt/stock/get?secid=${INDICES[idx].secid}&fields=f43,f44,f45,f46,f47,f48,f50,f51,f52,f53,f54,f55,f56,f57,f58&ut=fa5fd1943c7b386f172d6893dbfba10b`,
    { headers: { Referer: 'https://quote.eastmoney.com/', Origin: 'https://quote.eastmoney.com/' } }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const d = json.data;
  if (!d) throw new Error('无数据');
  return {
    price: d.f43 / 100, change: d.f169 / 100, percent: d.f170 / 100,
    open: d.f46 / 100, high: d.f44 / 100, low: d.f45 / 100,
    volume: d.f47 / 100, prevClose: (d.f43 - d.f169) / 100,
  };
}

// 网易财经
async function fetchNetEase(idx) {
  const res = await fetch(`https://api.money.126.net/data/feed/${INDICES[idx].netease}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const match = text.match(/merge\((.+)\)/);
  if (!match) throw new Error('解析失败');
  const raw = JSON.parse(match[1]);
  const key = Object.keys(raw)[0];
  const d = raw[key];
  if (!d) throw new Error('无数据');
  return {
    price: d.price, change: d.price - d.yestclose,
    percent: (d.price - d.yestclose) / d.yestclose * 100,
    open: d.open, high: d.high, low: d.low, volume: d.vol / 100, prevClose: d.yestclose,
  };
}

// 腾讯证券
async function fetchTencent(idx) {
  const res = await fetch(`https://qt.gtimg.cn/q=${INDICES[idx].tencent}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const match = text.match(/="([^"]+)"/);
  if (!match) throw new Error('解析失败');
  const parts = match[1].split('~');
  const price = parseFloat(parts[1]);
  const prevClose = parseFloat(parts[3]);
  return {
    price, change: price - prevClose, percent: ((price - prevClose) / prevClose * 100),
    open: parseFloat(parts[4]), high: parseFloat(parts[5]), low: parseFloat(parts[6]),
    volume: parseInt(parts[7]) / 100, prevClose,
  };
}

// 主轮询
async function poll() {
  try {
    let data;
    if (currentSource === 'eastmoney') data = await fetchEastmoney(currentIndex);
    else if (currentSource === 'netEase') data = await fetchNetEase(currentIndex);
    else if (currentSource === 'tencent') data = await fetchTencent(currentIndex);
    if (isFirstLoad) {
      priceHistory = [{ price: data.price, prevClose: data.prevClose }];
      isFirstLoad = false;
    } else {
      const last = priceHistory[priceHistory.length - 1];
      if (!last || Math.abs(last.price - data.price) > 0.0001) {
        priceHistory.push({ price: data.price });
        if (priceHistory.length > MAX_HISTORY) priceHistory.shift();
      }
    }
    showContent(); updateUI(data);
  } catch (e) {
    console.warn(`[${currentSource}]`, e.message);
    if (isFirstLoad) showError(`${SOURCE_LABELS[currentSource]} 获取失败: ${e.message}`);
  }
}

// 切换指数
document.querySelectorAll('.index-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = btn.dataset.index;
    if (idx === currentIndex) return;
    currentIndex = idx;
    document.querySelectorAll('.index-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    el.indexName.textContent = INDICES[idx].name;
    el.indexCode.textContent = `${INDICES[idx].label} · ${INDICES[idx].code}`;
    isFirstLoad = true; priceHistory = [];
    showLoading(); poll();
  });
});

// 切换数据源
document.querySelectorAll('.source-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const src = btn.dataset.source;
    if (src === currentSource) return;
    currentSource = src;
    document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    isFirstLoad = true; priceHistory = [];
    showLoading(); poll();
  });
});

// 启动
showLoading(); poll();
setInterval(poll, 3000);
window.addEventListener('resize', () => drawChart());
</script>
</body>
</html>
